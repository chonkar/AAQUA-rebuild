version: '3.8'

services:
  # ─── PostgreSQL Database ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aaqua-postgres
    environment:
      POSTGRES_USER: aaqua
      POSTGRES_PASSWORD: aaqua
      POSTGRES_DB: aaqua_security
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aaqua -d aaqua_security" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── OWASP ZAP (Daemon Mode) ───────────────────────────
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: aaqua-zap
    command: >
      zap.sh -daemon -port 8080 -host 0.0.0.0 -config api.disablekey=true -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config connection.timeoutInSecs=120
    network_mode: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/JSON/core/view/version/" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # Resource limits to prevent ZAP from consuming too much memory
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  postgres_data:
    driver: local
