# Shared infrastructure tier on host aaqua.aaseya.com (:8443 public TLS).
# - postgres-17:    multi-tenant cluster, INTERNAL ONLY (5443 = tooling only)
# - keycloak:       multi-realm IAM, INTERNAL ONLY (reached via shared-nginx)
# - nginx:          public edge on :80 (later :443), routes path-prefix per tenant
#
# Bring up:    docker compose up -d
# Tear down:   docker compose down       (-v also wipes Postgres + Keycloak data)

services:
  postgres:
    image: postgres:17-alpine
    container_name: shared-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_super_password
      POSTGRES_DB: postgres
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set in .env}
      AAQUA_DB_PASSWORD:    ${AAQUA_DB_PASSWORD:?set in .env}
    secrets:
      - postgres_super_password
    ports:
      - "5443:5432"            # tooling only — firewall to LAN/VPN
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: shared-keycloak
    # `start` (no --optimized) lets Keycloak auto-configure for KC_DB=postgres at boot
    # rather than requiring a pre-build step. Adds ~30s to first boot; trivial for a
    # long-lived deployment. Use `start --optimized` only if you've run
    #   docker compose run --rm --no-deps --entrypoint /opt/keycloak/bin/kc.sh keycloak build --db=postgres
    # ahead of time.
    command: ["start", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD:        ${KEYCLOAK_DB_PASSWORD:?set in .env}
      KEYCLOAK_ADMIN:        ${KEYCLOAK_ADMIN_USER:-superadmin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set in .env}
      KC_HTTP_RELATIVE_PATH: /auth
      # KC_HOSTNAME must be a BARE HOSTNAME (no scheme, no port). If you pass a URL
      # like `https://aaqua.aaseya.com:8443`, Keycloak treats the whole string as
      # the host and produces malformed issuer URLs like `https://https//...` on
      # frontchannel endpoints (login page, logout). Keep KC_PUBLIC_BASE_URL
      # (full URL) separate — that one's used by render-realm.sh, not by Keycloak.
      # Non-default port goes in KC_HOSTNAME_PORT, not KC_HOSTNAME.
      KC_HOSTNAME: ${KC_HOSTNAME:-aaqua.aaseya.com}
      KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT:-8443}
      # KC_PROXY_HEADERS replaces the deprecated KC_PROXY=edge (gone in Keycloak 26).
      KC_PROXY_HEADERS: xforwarded
      # STRICT=true enforces hostname match on frontchannel URLs (login, logout); STRICT_BACKCHANNEL=false
      # lets the backend reach Keycloak via the docker-internal hostname for JWKS fetch and token exchange.
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: shared-nginx
    ports:
      - "80:80"
      # - "443:443"           # uncomment when TLS lands (out-of-scope here)
    environment:
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx/tenants.d
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/conf.d.templates:/etc/nginx/templates:ro
      - ./nginx/sites:/var/www:ro
      - ./secrets:/run/shared-secrets:ro
      - ./nginx/10-load-tenant-secrets.envsh:/docker-entrypoint.d/10-load-tenant-secrets.envsh:ro
    tmpfs:
      - /etc/nginx/tenants.d
    healthcheck:
      # Use 127.0.0.1 not localhost: Alpine's libc resolves localhost to ::1 (IPv6)
      # first, but nginx only binds IPv4 (the upstream image's IPv6 entrypoint
      # script keys on /etc/nginx/conf.d/default.conf which we don't ship).
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  default:
    name: shared-infra_default
    driver: bridge

volumes:
  postgres_data:
    driver: local

secrets:
  postgres_super_password:
    file: ./secrets/postgres_super_password.txt
