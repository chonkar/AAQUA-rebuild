# Port 80 — kept alive ONLY for the container healthcheck and the HTTP→HTTPS redirect.
# See CLAUDE.md gotcha #21: the official nginx image's healthcheck is
# `wget http://127.0.0.1/healthz`, which would TLS-fail if redirected to HTTPS
# against the self-signed cert. So /healthz stays on :80 while everything else
# 301-redirects to HTTPS.
server {
    listen 80 default_server;
    server_name _;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Port 443 — main edge. Self-signed cert in QA, real CA cert in prod.
# Tenant locations (/aaqua/, /aaqua/api/, /aaqua/llm-api/) are pulled in via
# `include /etc/nginx/tenants.d/*.conf` — that path is a tmpfs the nginx image
# fills by running envsubst over /etc/nginx/templates/*.template at boot.
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /run/shared-secrets/tls/aaqua.crt;
    ssl_certificate_key /run/shared-secrets/tls/aaqua.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = / { return 302 /aaqua/; }

    # Shared Keycloak. NO trailing slash on proxy_pass — preserves /auth/* verbatim.
    # Buffer sizes per CLAUDE.md gotcha #22: Keycloak's Set-Cookie headers
    # (AUTH_SESSION_ID + KC_RESTART + KEYCLOAK_LOCALE + standard headers) exceed
    # nginx's default 4 KB proxy buffer and produce intermittent 502s mid sign-in.
    location /auth/ {
        proxy_pass               http://shared-keycloak:8080;
        proxy_http_version       1.1;
        proxy_set_header         Host              $host;
        proxy_set_header         X-Real-IP         $remote_addr;
        proxy_set_header         X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header         X-Forwarded-Proto $scheme;
        proxy_set_header         X-Forwarded-Host  $host;
        proxy_buffering          off;
        proxy_buffer_size        16k;
        proxy_buffers            4 16k;
        proxy_busy_buffers_size  32k;
        proxy_read_timeout       300s;
    }

    # Tenant fragments rendered by the nginx image's envsubst pass into a tmpfs.
    include /etc/nginx/tenants.d/*.conf;
}
