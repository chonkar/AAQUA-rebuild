; supervisord config for the bundled AAQUA container.
; Two long-running processes: nginx (foreground) and the Node backend.
; Both inherit env vars exported by app-entrypoint.sh (DATABASE_URL,
; VITE_LLM_API_KEY, JWT_SECRET, JIRA_TOKEN, etc.) — no need to repeat them here.

[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:backend]
command=/usr/bin/node /app/server/index.js
directory=/app
autostart=true
autorestart=true
priority=20
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
